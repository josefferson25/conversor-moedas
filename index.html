<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conversor de Moedas • Elegante</title>
    <!-- Font Awesome (ícones) -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"
    />
    <!-- Google Fonts (Inter) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap"
      rel="stylesheet"
    />
    <!-- CSS -->
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="background-overlay"></div>
    <main class="container">
      <div class="card">
        <div class="card-header">
          <i class="fas fa-globe-americas"></i>
          <h1>Conversor de Moedas</h1>
          <p>Cotações atualizadas em tempo real</p>
        </div>

        <div class="card-body">
          <!-- Moeda de origem -->
          <div class="input-group">
            <label><i class="fas fa-arrow-up"></i> Converter de</label>
            <select id="currency-from" class="custom-select">
              <option value="BRL" selected>🇧🇷 BRL - Real Brasileiro</option>
              <option value="USD">🇺🇸 USD - Dólar Americano</option>
              <option value="EUR">🇪🇺 EUR - Euro</option>
              <option value="GBP">🇬🇧 GBP - Libra Esterlina</option>
              <option value="BTC">₿ BTC - Bitcoin</option>
            </select>
          </div>

          <!-- Moeda de destino -->
          <div class="input-group">
            <label><i class="fas fa-arrow-down"></i> Converter para</label>
            <select id="currency-to" class="custom-select">
              <option value="USD">🇺🇸 USD - Dólar Americano</option>
              <option value="EUR">🇪🇺 EUR - Euro</option>
              <option value="GBP">🇬🇧 GBP - Libra Esterlina</option>
              <option value="BTC">₿ BTC - Bitcoin</option>
              <option value="BRL">🇧🇷 BRL - Real Brasileiro</option>
            </select>
          </div>

          <!-- Valor -->
          <div class="input-group">
            <label><i class="fas fa-coins"></i> Valor</label>
            <input
              type="number"
              id="amount"
              placeholder="Ex: 1000"
              value="1000"
              step="0.01"
              min="0"
            />
          </div>

          <!-- Botão converter -->
          <button id="convert-btn" class="btn-convert">
            <i class="fas fa-exchange-alt"></i> Converter
          </button>

          <!-- Resultado -->
          <div class="result-area" id="result-area" style="display: none">
            <div class="currency-card from">
              <span class="currency-label">De</span>
              <span class="currency-value" id="from-value">R$ 0,00</span>
              <span class="currency-code" id="from-code">BRL</span>
            </div>
            <i class="fas fa-arrow-right arrow-icon"></i>
            <div class="currency-card to">
              <span class="currency-label">Para</span>
              <span class="currency-value" id="to-value">US$ 0,00</span>
              <span class="currency-code" id="to-code">USD</span>
            </div>
          </div>
        </div>

        <div class="card-footer">
          <p>
            <i class="fas fa-sync-alt"></i> Cotações fornecidas por
            <a href="https://exchangerate.host" target="_blank" rel="noopener"
              >exchangerate.host</a
            >
          </p>
        </div>
      </div>
    </main>

    <script src="script.js"></script>
  </body>
</html>
